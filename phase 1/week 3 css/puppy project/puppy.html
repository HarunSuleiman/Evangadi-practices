<!DOCTYPE html>

    <title>Puppy Lovers</title>

    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,600;1,700&display=swap" rel="stylesheet">
    <style>
 
    .box {
      width: 150px;
      height: 150px;
      position: absolute;
      opacity: 0.8;
    }
    .red {
      background: red;
      top: 30px;
      left: 30px;
      z-index: 1; /* behind */
    }
    .blue {
      background: blue;
      top: 60px;
      left: 60px;
      z-index: 2; /* in front */
    }
    .green {
      background: green;
      top: 90px;
      left: 90px;
      z-index: 3; /* on top */
    }
  </style>
    </style>
  </head>
