<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=" />
    <title>Form Example with events</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <h2 id="h1">Form validation</h2>
    <h3>Registration Foarm</h3>
    <div id="ddd">
      <form action="#" id="FormID" method="post">
        <p>Firist name</p>
        <input
          type="text"
          id="fname"
          name="first name"
          placeholder="Enter First name"
        /><br />
        <p>Last name</p>
        <input
          type="text"
          id="lname"
          name="last name"
          placeholder=" Enter Last name"
        /><br />
        <p>Password</p>
        <input
          type="text"
          id="password"
          name="password"
          placeholder="Enter password"
        /><br /><br />

        <button
          class="submition button"
          type="submit"
          style="margin-left: 120px"
        >
          submit
        </button>
      </form>
    </div>
    <script src="./jquery-3.7.1.js"></script>

    <script src="./script.js"></script>
  </body>
</html>
